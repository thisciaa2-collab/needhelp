<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | NeedHelp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="volver"> ← Volver al inicio</a>

        <div class="formulario-contenedor animar">
            <div class="formulario">
                <h2>🔑 Bienvenido de nuevo</h2>
                
                <div class="grupo-input">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="grupo-input">
                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" placeholder="Ingresa tu contraseña" required>
                </div>

                <a href="dashboard.html" class="boton boton-primario" style="width: 100%; margin: 10px 0;">Acceder a mi cuenta</a>

                <p style="text-align: center; margin-top: 20px;">
                    ¿No tienes cuenta? <a href="register.html" class="enlace-texto">Regístrate gratis aquí</a>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
